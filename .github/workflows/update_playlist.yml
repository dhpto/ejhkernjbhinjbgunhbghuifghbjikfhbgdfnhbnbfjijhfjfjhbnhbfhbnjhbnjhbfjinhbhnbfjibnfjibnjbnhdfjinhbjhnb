name: Update M3U8 Playlist

on:
  schedule:
    - cron: '0 * * * *' # Runs every hour at minute 0
  workflow_dispatch: # Allows you to trigger it manually from the Actions tab

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies & Browser
        run: |
          python -m pip install --upgrade pip
          # Explicitly install all required libraries
          pip install playwright beautifulsoup4 aiohttp
          # Install the Chromium browser that Playwright needs to run
          playwright install chromium

      - name: Execute Secure Memory Wrapper
        env:
          # 🛡️ Injects your secret code into the environment variable main.py expects
          SECURE_DECRYPT_CODE: ${{ secrets.SECURE_DECRYPT_CODE }}
        run: python main.py

      - name: Commit and push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add playlist.m3u
          
          # Only commit if there are actual changes to the file
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-update validated playlist.m3u" && git push)
