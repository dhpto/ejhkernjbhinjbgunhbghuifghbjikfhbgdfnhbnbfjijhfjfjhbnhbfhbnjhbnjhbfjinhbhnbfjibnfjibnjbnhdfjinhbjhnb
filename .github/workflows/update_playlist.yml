name: Update M3U8 Playlist

on:
  schedule:
    - cron: '0 * * * *' # Runs every hour
  workflow_dispatch: # Allows manual triggering

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    
    # 🚀 CRITICAL: This official Docker image has Python, Playwright, and Chromium pre-installed.
    # This eliminates the need to slowly install browsers on every run.
    container:
      image: mcr.microsoft.com/playwright/python:v1.45.0-jammy

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install missing Python packages
        run: |
          # ⚠️ DO NOT run 'pip install playwright' here. 
          # The Docker image already has it. We ONLY install the libraries your script imports.
          pip install beautifulsoup4 aiohttp

      - name: Execute Secure Memory Wrapper
        env:
          # 🛡️ Injects your secret code into the environment variable main.py expects
          SECURE_DECRYPT_CODE: ${{ secrets.SECURE_DECRYPT_CODE }}
        run: python main.py

      - name: Commit and push if changed
        run: |
          # Fix git ownership warning that happens in Docker containers
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add playlist.m3u
          # Only commit if there are actual changes to the file
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-update validated playlist.m3u" && git push)
