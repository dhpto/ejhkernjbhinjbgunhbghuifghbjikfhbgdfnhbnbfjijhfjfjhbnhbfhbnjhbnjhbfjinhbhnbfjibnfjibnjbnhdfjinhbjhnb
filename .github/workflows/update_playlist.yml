name: Update M3U8 Playlist

on:
  schedule:
    - cron: '0 * * * *' # Runs every hour at minute 0
  workflow_dispatch: # Allows you to trigger it manually from the Actions tab

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Caches dependencies to make future runs much faster

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Browser & System Dependencies
        run: |
          playwright install chromium
          playwright install-deps chromium # CRITICAL: Installs Ubuntu system libraries needed for Chromium

      - name: Run Playlist Generator
        run: python main.py

      - name: Commit and push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add playlist.m3u
          # Only commit if there are actual changes to the file
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-update validated playlist.m3u" && git push)
